server:
  port: ${PORT:5001}
  forward-headers-strategy: framework

spring:
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://127.0.0.1:27017/api-rate-limiter}
    redis:
      url: ${SPRING_REDIS_URL:redis://127.0.0.1:6379}
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt-secret: ${JWT_SECRET:change_this_secret}
  cors-origins: ${CORS_ORIGIN:}
  redis-url: ${REDIS_URL:redis://127.0.0.1:6379}
  open-browser-on-startup: ${OPEN_BROWSER_ON_STARTUP:true}
  startup-page: ${STARTUP_PAGE:/dashboard}
