name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  app-check:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend-java
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run backend check
        run: |
          mvn -q test
          mvn -q -DskipTests package
