services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend-java
    restart: unless-stopped
    env_file:
      - ./backend-java/.env
    environment:
      PORT: 5001
      MONGO_URI: mongodb://mongo:27017/api-rate-limiter
      REDIS_URL: redis://redis:6379
      SPRING_REDIS_URL: redis://redis:6379
      OPEN_BROWSER_ON_STARTUP: false
    depends_on:
      - mongo
      - redis
    ports:
      - "8080:5001"

volumes:
  mongo_data:
  redis_data:
